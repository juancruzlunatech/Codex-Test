<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris JS - Responsive Single Page</title>
  <style>
    :root {
      --bg: #070b1e;
      --panel: rgba(12, 19, 47, 0.8);
      --panel-border: rgba(154, 178, 255, 0.24);
      --accent: #7dd3fc;
      --text: #ecf2ff;
      --muted: #a7b8dd;
      --btn-start: #5b8cff;
      --btn-end: #7c4dff;
      --btn-shadow: rgba(57, 103, 246, 0.42);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 20px;
      background:
        radial-gradient(circle at 15% 20%, rgba(80, 160, 255, 0.25), transparent 40%),
        radial-gradient(circle at 85% 12%, rgba(185, 120, 255, 0.24), transparent 35%),
        radial-gradient(circle at 50% 100%, rgba(124, 240, 214, 0.2), transparent 42%),
        linear-gradient(155deg, #050814 0%, #0a1230 45%, #101d46 100%);
      overflow-x: hidden;
    }

    .wrap {
      display: grid;
      grid-template-columns: auto 240px;
      gap: 18px;
      background: rgba(5, 11, 33, 0.68);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      box-shadow: 0 24px 60px rgba(2, 6, 18, 0.6);
      padding: 16px;
      backdrop-filter: blur(8px);
    }

    #game {
      width: min(300px, 100%);
      height: auto;
      aspect-ratio: 1 / 2;
    }

    canvas {
      background:
        linear-gradient(rgba(12, 24, 62, 0.92), rgba(10, 19, 48, 0.95)),
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.04) 0,
          rgba(255, 255, 255, 0.04) 1px,
          transparent 1px,
          transparent 30px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.04) 0,
          rgba(255, 255, 255, 0.04) 1px,
          transparent 1px,
          transparent 30px
        );
      border: 1px solid rgba(161, 189, 255, 0.32);
      border-radius: 12px;
      image-rendering: pixelated;
      display: block;
    }

    .hud {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 10px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.1rem;
      color: #c7d8ff;
      letter-spacing: .04em;
    }

    .label { color: var(--muted); font-size: .82rem; text-transform: uppercase; letter-spacing: .08em; }
    .value { font-size: 1.4rem; font-weight: 700; margin-top: 4px; }
    .controls { font-size: .85rem; line-height: 1.45; color: #d9e4ff; }

    .touch-controls {
      display: none;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .touch-controls button {
      padding: 12px 6px;
      font-size: .96rem;
      border: 1px solid rgba(194, 211, 255, .28);
      background: linear-gradient(135deg, rgba(97, 138, 255, .95), rgba(125, 88, 255, .95));
      box-shadow: 0 8px 16px rgba(66, 69, 180, .28);
    }

    .touch-controls .wide { grid-column: span 3; }
    .touch-controls .side { grid-column: span 1; }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px;
      background: linear-gradient(135deg, var(--btn-start), var(--btn-end));
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 20px var(--btn-shadow);
    }

    button:hover { filter: brightness(1.08); }

    .over {
      color: #ffd0da;
      font-weight: 700;
      min-height: 22px;
    }

    @media (max-width: 760px) {
      body { padding: 10px; }
      .wrap {
        width: min(100%, 520px);
        grid-template-columns: 1fr;
      }
      .hud { order: -1; }
      .touch-controls { display: grid; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="300" height="600" aria-label="Tetris board"></canvas>
    <aside class="hud">
      <div class="card">
        <h1>Tetris</h1>
        <div class="label">Score</div>
        <div class="value" id="score">0</div>
        <div class="label">Level</div>
        <div class="value" id="level">1</div>
        <div class="label">Lines</div>
        <div class="value" id="lines">0</div>
      </div>
      <div class="card">
        <div class="label">Next piece</div>
        <canvas id="next" width="120" height="120"></canvas>
      </div>
      <div class="card controls">
        <strong>Controls:</strong><br>
        ← → move<br>
        ↑ rotate<br>
        ↓ soft drop<br>
        Space: hard drop<br>
        P: pause
      </div>
      <div class="touch-controls" aria-label="Mobile controls">
        <button data-action="left">← Left</button>
        <button data-action="rotate">↻ Rotate</button>
        <button data-action="right">Right →</button>
        <button data-action="down">↓ Down</button>
        <button data-action="pause" class="side">⏯ Pause</button>
        <button data-action="drop" class="wide">⤓ Hard Drop</button>
      </div>
      <button id="restart">Restart game</button>
      <div class="over" id="status"></div>
    </aside>
  </div>

<script>
(() => {
  const COLS = 10;
  const ROWS = 20;
  const BLOCK = 30;
  const board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

  const colors = {
    I: '#5ee7ff',
    O: '#ffe58f',
    T: '#c7a6ff',
    S: '#70f6c3',
    Z: '#ff8fa6',
    J: '#8fc8ff',
    L: '#ffc07a'
  };

  const shapes = {
    I: [[1,1,1,1]],
    O: [[1,1],[1,1]],
    T: [[0,1,0],[1,1,1]],
    S: [[0,1,1],[1,1,0]],
    Z: [[1,1,0],[0,1,1]],
    J: [[1,0,0],[1,1,1]],
    L: [[0,0,1],[1,1,1]]
  };

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const nextCanvas = document.getElementById('next');
  const nextCtx = nextCanvas.getContext('2d');

  const scoreEl = document.getElementById('score');
  const levelEl = document.getElementById('level');
  const linesEl = document.getElementById('lines');
  const statusEl = document.getElementById('status');
  const restartBtn = document.getElementById('restart');
  const touchButtons = document.querySelectorAll('[data-action]');

  let score = 0;
  let lines = 0;
  let level = 1;
  let paused = false;
  let gameOver = false;
  let dropCounter = 0;
  let lastTime = 0;

  const bag = [];
  function randomType() {
    if (!bag.length) {
      bag.push(...Object.keys(shapes).sort(() => Math.random() - 0.5));
    }
    return bag.pop();
  }

  function createPiece(type = randomType()) {
    return {
      type,
      shape: shapes[type].map(r => [...r]),
      x: Math.floor(COLS / 2) - 2,
      y: 0
    };
  }

  let current = createPiece();
  let next = createPiece();

  function drawBlock(c, x, y, color) {
    const px = x * BLOCK;
    const py = y * BLOCK;

    c.fillStyle = color;
    c.fillRect(px, py, BLOCK, BLOCK);

    c.fillStyle = 'rgba(255,255,255,0.2)';
    c.fillRect(px + 2, py + 2, BLOCK - 4, 5);

    c.fillStyle = 'rgba(10,20,45,0.2)';
    c.fillRect(px + 2, py + BLOCK - 8, BLOCK - 4, 6);

    c.strokeStyle = 'rgba(255,255,255,.22)';
    c.strokeRect(px + .5, py + .5, BLOCK - 1, BLOCK - 1);
  }

  function collide(piece, offX = 0, offY = 0, shape = piece.shape) {
    for (let y = 0; y < shape.length; y++) {
      for (let x = 0; x < shape[y].length; x++) {
        if (!shape[y][x]) continue;
        const nx = piece.x + x + offX;
        const ny = piece.y + y + offY;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
        if (ny >= 0 && board[ny][nx]) return true;
      }
    }
    return false;
  }

  function merge(piece) {
    piece.shape.forEach((row, y) => row.forEach((v, x) => {
      if (v && piece.y + y >= 0) board[piece.y + y][piece.x + x] = piece.type;
    }));
  }

  function rotate(shape) {
    return shape[0].map((_, i) => shape.map(row => row[i]).reverse());
  }

  function tryRotate() {
    const rotated = rotate(current.shape);
    const kicks = [0, -1, 1, -2, 2];
    for (const k of kicks) {
      if (!collide(current, k, 0, rotated)) {
        current.shape = rotated;
        current.x += k;
        return;
      }
    }
  }

  function clearLines() {
    let cleared = 0;
    for (let y = ROWS - 1; y >= 0; y--) {
      if (board[y].every(Boolean)) {
        board.splice(y, 1);
        board.unshift(Array(COLS).fill(0));
        cleared++;
        y++;
      }
    }
    if (cleared) {
      const linePoints = [0, 100, 300, 500, 800];
      score += linePoints[cleared] * level;
      lines += cleared;
      level = Math.floor(lines / 10) + 1;
      updateHud();
    }
  }

  function lockPiece() {
    merge(current);
    clearLines();
    current = next;
    next = createPiece();
    if (collide(current)) {
      gameOver = true;
      statusEl.textContent = '💀 Game Over. Press Restart.';
    }
  }

  function hardDrop() {
    while (!collide(current, 0, 1)) {
      current.y++;
      score += 2;
    }
    lockPiece();
    updateHud();
  }

  function updateHud() {
    scoreEl.textContent = score;
    levelEl.textContent = level;
    linesEl.textContent = lines;
    drawNext();
  }

  function drawBoard() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    board.forEach((row, y) => row.forEach((cell, x) => {
      if (cell) drawBlock(ctx, x, y, colors[cell]);
    }));

    let ghostY = current.y;
    while (!collide(current, 0, ghostY - current.y + 1)) ghostY++;
    current.shape.forEach((row, y) => row.forEach((v, x) => {
      if (!v) return;
      ctx.fillStyle = 'rgba(167, 184, 221, 0.24)';
      ctx.fillRect((current.x + x) * BLOCK, (ghostY + y) * BLOCK, BLOCK, BLOCK);
    }));

    current.shape.forEach((row, y) => row.forEach((v, x) => {
      if (v) drawBlock(ctx, current.x + x, current.y + y, colors[current.type]);
    }));
  }

  function drawNext() {
    nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
    const shape = next.shape;
    const size = 24;
    const offsetX = Math.floor((nextCanvas.width - shape[0].length * size) / 2);
    const offsetY = Math.floor((nextCanvas.height - shape.length * size) / 2);

    shape.forEach((row, y) => row.forEach((v, x) => {
      if (!v) return;
      nextCtx.fillStyle = colors[next.type];
      nextCtx.fillRect(offsetX + x * size, offsetY + y * size, size, size);
      nextCtx.strokeStyle = 'rgba(255,255,255,.24)';
      nextCtx.strokeRect(offsetX + x * size + .5, offsetY + y * size + .5, size - 1, size - 1);
    }));
  }

  function tick(time = 0) {
    const delta = time - lastTime;
    lastTime = time;

    if (!paused && !gameOver) {
      dropCounter += delta;
      const interval = Math.max(120, 900 - (level - 1) * 90);
      if (dropCounter > interval) {
        if (!collide(current, 0, 1)) {
          current.y++;
        } else {
          lockPiece();
        }
        dropCounter = 0;
      }
    }

    drawBoard();
    requestAnimationFrame(tick);
  }

  function restart() {
    for (const row of board) row.fill(0);
    score = 0;
    lines = 0;
    level = 1;
    paused = false;
    gameOver = false;
    statusEl.textContent = '';
    current = createPiece();
    next = createPiece();
    dropCounter = 0;
    updateHud();
  }

  function togglePause() {
    if (gameOver) return;
    paused = !paused;
    statusEl.textContent = paused ? '⏸️ Paused' : '';
  }

  document.addEventListener('keydown', (e) => {
    if (gameOver && e.key.toLowerCase() !== 'r') return;
    if (e.key.toLowerCase() === 'p') {
      togglePause();
      return;
    }
    if (paused || gameOver) return;

    if (e.key === 'ArrowLeft' && !collide(current, -1, 0)) current.x--;
    else if (e.key === 'ArrowRight' && !collide(current, 1, 0)) current.x++;
    else if (e.key === 'ArrowDown') {
      if (!collide(current, 0, 1)) {
        current.y++;
        score += 1;
        updateHud();
      }
    } else if (e.key === 'ArrowUp') {
      tryRotate();
    } else if (e.code === 'Space') {
      e.preventDefault();
      hardDrop();
    }
  });

  function handleAction(action) {
    if (action === 'pause') {
      togglePause();
      return;
    }
    if (paused || gameOver) return;
    if (action === 'left' && !collide(current, -1, 0)) current.x--;
    else if (action === 'right' && !collide(current, 1, 0)) current.x++;
    else if (action === 'down' && !collide(current, 0, 1)) {
      current.y++;
      score += 1;
      updateHud();
    } else if (action === 'rotate') {
      tryRotate();
    } else if (action === 'drop') {
      hardDrop();
    }
  }

  touchButtons.forEach((button) => {
    button.addEventListener('click', () => handleAction(button.dataset.action));
  });

  restartBtn.addEventListener('click', restart);
  updateHud();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
